<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">
    Inference Acceleration Benchmark
  </text>
  <text x="400" y="62" text-anchor="middle" font-size="12" fill="#666">
    H20 96G · 1920×480 · 99 frames · baseline: xformers = 1.0×
  </text>

  <!-- Y axis label -->
  <text x="55" y="290" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e"
        transform="rotate(-90 55 290)">Speedup (×)</text>

  <!-- Y axis -->
  <line x1="200" y1="100" x2="200" y2="420" stroke="#1a1a2e" stroke-width="2"/>

  <!-- X axis -->
  <line x1="200" y1="420" x2="760" y2="420" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Grid lines + Y labels: 0, 10, 20, 30 -->
  <line x1="200" y1="420" x2="760" y2="420" stroke="#e6e6e6"/>
  <text x="192" y="425" text-anchor="end" font-size="11" fill="#666">0</text>

  <line x1="200" y1="368" x2="760" y2="368" stroke="#e6e6e6" stroke-dasharray="3 3"/>
  <text x="192" y="373" text-anchor="end" font-size="11" fill="#666">10</text>

  <line x1="200" y1="316" x2="760" y2="316" stroke="#e6e6e6" stroke-dasharray="3 3"/>
  <text x="192" y="321" text-anchor="end" font-size="11" fill="#666">20</text>

  <line x1="200" y1="264" x2="760" y2="264" stroke="#e6e6e6" stroke-dasharray="3 3"/>
  <text x="192" y="269" text-anchor="end" font-size="11" fill="#666">30</text>

  <!-- 6 bars, slot width 90, bar width 60, centers at 255, 345, 435, 525, 615, 705 -->
  <!-- xformers: 1.00x (baseline) → top=414.8 -->
  <rect x="225" y="414.8" width="60" height="5.2" rx="3" fill="#6c757d"/>
  <text x="255" y="408" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a2e">1.00×</text>
  <text x="255" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">xformers</text>
  <text x="255" y="461" text-anchor="middle" font-size="10" fill="#666">baseline</text>

  <!-- FA3 compile: 1.25x → top=413.5 -->
  <rect x="315" y="413.5" width="60" height="6.5" rx="3" fill="#1f77b4"/>
  <text x="345" y="407" text-anchor="middle" font-size="12" font-weight="700" fill="#1f77b4">1.25×</text>
  <text x="345" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">FA3</text>
  <text x="345" y="461" text-anchor="middle" font-size="10" fill="#666">compile</text>

  <!-- SageAttn compile: 1.31x → top=413.19 -->
  <rect x="405" y="413.19" width="60" height="6.81" rx="3" fill="#2ca02c"/>
  <text x="435" y="407" text-anchor="middle" font-size="12" font-weight="700" fill="#2ca02c">1.31×</text>
  <text x="435" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">SageAttn</text>
  <text x="435" y="461" text-anchor="middle" font-size="10" fill="#666">compile</text>

  <!-- DMD2 1 GPU: 10.89x → top=363.37 -->
  <rect x="495" y="363.37" width="60" height="56.63" rx="3" fill="#ff7f0e"/>
  <text x="525" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#ff7f0e">10.89×</text>
  <text x="525" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">DMD2</text>
  <text x="525" y="461" text-anchor="middle" font-size="10" fill="#666">1 GPU</text>

  <!-- DMD2 2 GPU: 18.19x → top=325.41 -->
  <rect x="585" y="325.41" width="60" height="94.59" rx="3" fill="#d62728"/>
  <text x="615" y="319" text-anchor="middle" font-size="12" font-weight="700" fill="#d62728">18.19×</text>
  <text x="615" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">DMD2</text>
  <text x="615" y="461" text-anchor="middle" font-size="10" fill="#666">2 GPU</text>

  <!-- DMD2 4 GPU: 27.23x → top=278.4 -->
  <rect x="675" y="278.4" width="60" height="141.6" rx="3" fill="#17becf"/>
  <text x="705" y="272" text-anchor="middle" font-size="12" font-weight="700" fill="#17becf">27.23×</text>
  <text x="705" y="445" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a2e">DMD2</text>
  <text x="705" y="461" text-anchor="middle" font-size="10" fill="#666">4 GPU</text>

  <!-- Legend -->
  <g transform="translate(220, 482)">
    <rect x="0" y="0" width="14" height="10" fill="#6c757d" rx="2"/>
    <text x="20" y="9" font-size="11" fill="#666">Baseline</text>

    <rect x="90" y="0" width="14" height="10" fill="#1f77b4" rx="2"/>
    <text x="110" y="9" font-size="11" fill="#666">Attention</text>

    <rect x="195" y="0" width="14" height="10" fill="#ff7f0e" rx="2"/>
    <text x="215" y="9" font-size="11" fill="#666">DMD2 (Ours)</text>
  </g>
</svg>